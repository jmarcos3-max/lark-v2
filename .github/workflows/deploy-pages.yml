name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          GITHUB_ACTIONS: true
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: Verify production build
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -d dist/assets
          asset_count="$(find dist/assets -type f | wc -l | tr -d ' ')"
          if [ "$asset_count" -lt 2 ]; then
            echo "Expected bundled assets in dist/assets, found $asset_count file(s)"
            ls -la dist dist/assets || true
            exit 1
          fi
          if ! grep -qE 'assets/index-[^"]+\.js' dist/index.html; then
            echo "dist/index.html still looks like dev (missing hashed /assets/ script):"
            cat dist/index.html
            exit 1
          fi
          echo "Built $(du -sh dist | cut -f1) with $asset_count asset file(s)"

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Publish built site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Point GitHub Pages at gh-pages branch
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.updatePages({
                owner,
                repo,
                build_type: 'legacy',
                source: { branch: 'gh-pages', path: '/' },
              });
              core.info('Pages source set to gh-pages / (root).');
            } catch (error) {
              core.setFailed(
                `Could not set Pages source automatically (${error.status ?? 'unknown'}). ` +
                  'Open repo Settings → Pages → Deploy from branch → gh-pages → / (root).',
              );
              throw error;
            }
