name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"

permissions:
  contents: write
  pages: write
  id-token: write
  administration: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          GITHUB_ACTIONS: true
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: Verify production build
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -d dist/assets
          asset_count="$(find dist/assets -type f | wc -l | tr -d ' ')"
          if [ "$asset_count" -lt 2 ]; then
            echo "Expected bundled assets in dist/assets, found $asset_count file(s)"
            ls -la dist dist/assets || true
            exit 1
          fi
          if ! grep -qE 'assets/index-[^"]+\.js' dist/index.html; then
            echo "dist/index.html still looks like dev (missing hashed /assets/ script):"
            cat dist/index.html
            exit 1
          fi
          echo "Built $(du -sh dist | cut -f1) with $asset_count asset file(s)"

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Publish built site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Mirror built site into docs/ on main
        run: |
          rm -rf docs
          cp -r dist docs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet || git commit -m "Deploy site to docs [skip ci]"
          git push

      - name: Enable GitHub Pages on gh-pages branch
        uses: actions/github-script@v7
        continue-on-error: true
        id: pages_config
        with:
          script: |
            const { owner, repo } = context.repo;
            const source = { branch: 'gh-pages', path: '/' };

            async function enablePages() {
              try {
                await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  source,
                  build_type: 'legacy',
                });
                core.info('Created Pages site from gh-pages branch.');
                return;
              } catch (error) {
                if (error.status !== 409) throw error;
              }

              await github.rest.repos.updatePages({
                owner,
                repo,
                build_type: 'legacy',
                source,
              });
              core.info('Updated Pages site to gh-pages branch.');
            }

            await enablePages();

      - name: Pages settings reminder
        if: steps.pages_config.outcome == 'failure'
        run: |
          echo "::warning::Could not switch Pages source automatically."
          echo "::warning::Open Settings → Pages → Deploy from branch → gh-pages → / (root)"
          echo "::warning::Or use main → /docs if gh-pages is unavailable."
