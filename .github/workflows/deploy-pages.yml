name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "assets/**"
      - "index.html"
      - "404.html"
      - ".nojekyll"

permissions:
  contents: write
  pages: write
  id-token: write
  administration: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and sync Pages root files
        env:
          GITHUB_ACTIONS: true
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build:pages

      - name: Verify production build
        run: |
          set -euo pipefail
          test -f index.html
          test -d assets
          grep -qE 'assets/index-[^"]+\.js' index.html
          ! grep -q '/src/main.jsx' index.html
          echo "Pages root files ready"

      - name: Commit built site to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html .nojekyll assets docs
          git diff --staged --quiet || git commit -m "Deploy site to repo root [skip ci]"
          git push origin HEAD:main

      - name: Publish built site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
