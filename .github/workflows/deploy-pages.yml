name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Use dev entry HTML for Vite build
        run: cp index.dev.html index.html

      - name: Build
        env:
          GITHUB_ACTIONS: true
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_AUDIOTOOL_CLIENT_ID: ${{ secrets.VITE_AUDIOTOOL_CLIENT_ID }}
          VITE_ELEVENLABS_API_KEY: ${{ secrets.VITE_ELEVENLABS_API_KEY }}
        run: npm run build

      - name: Verify production build
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -d dist/assets
          grep -qE 'assets/index-[^"]+\.js' dist/index.html
          ! grep -q '/src/main.jsx' dist/index.html
          echo "dist/ ready for Pages"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
